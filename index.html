<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Satisfacción - BuenSabor</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <main class="container">
        <h1>Encuesta de Satisfacción</h1>
        <p class="subtitle">Cadena de Restaurantes BuenSabor</p>

        <form id="satisfactionForm">
            <div class="form-group">
                <label for="cliente">Nombre del cliente</label>
                <input type="text" id="cliente" placeholder="Ej: Carla Soto">
            </div>

            <div class="form-group">
                <label for="sucursal">Sucursal visitada</label>
                <input type="text" id="sucursal" placeholder="Ej: BuenSabor Providencia">
            </div>

            <div class="row header-row">
                <span class="col-aspecto">ASPECTO EVALUADO</span>
                <span class="col-small">CALIF. (1-5)</span>
                <span class="col-small">PESO (%)</span>
            </div>

            <div class="aspect-rows">
                <div class="row aspect-entry">
                    <input type="text" class="aspect-name" value="Calidad de la comida">
                    <input type="number" class="aspect-rating" placeholder="1-5">
                    <input type="number" class="aspect-weight" placeholder="%">
                </div>
                <div class="row aspect-entry">
                    <input type="text" class="aspect-name" value="Atención del personal">
                    <input type="number" class="aspect-rating" placeholder="1-5">
                    <input type="number" class="aspect-weight" placeholder="%">
                </div>
                <div class="row aspect-entry">
                    <input type="text" class="aspect-name" value="Tiempo de espera">
                    <input type="number" class="aspect-rating" placeholder="1-5">
                    <input type="number" class="aspect-weight" placeholder="%">
                </div>
                <div class="row aspect-entry">
                    <input type="text" class="aspect-name" value="Limpieza del local">
                    <input type="number" class="aspect-rating" placeholder="1-5">
                    <input type="number" class="aspect-weight" placeholder="%">
                </div>
                <div class="row aspect-entry">
                    <input type="text" class="aspect-name" value="Relación precio/calidad">
                    <input type="number" class="aspect-rating" placeholder="1-5">
                    <input type="number" class="aspect-weight" placeholder="%">
                </div>
            </div>

            <button type="button" id="btnCalcular">Calcular satisfacción</button>

            <div id="resultadoArea" class="hidden"></div>
            <div id="errorArea" class="hidden"></div>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
